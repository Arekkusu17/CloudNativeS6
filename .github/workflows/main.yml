name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: gestion-guias-despacho
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/gestion-guias-despacho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Configurar Java para compilar y probar Spring Boot
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Paso 3: Ejecutar pruebas del microservicio
      - name: Run tests
        run: mvn -B test

      # Paso 4: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 5: Construir la imagen de Docker
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:latest .

      # Paso 6: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:latest

      # Paso 7: Agregar llave SSH para conectarse a EC2
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 8: Conectarse a EC2 y desplegar el contenedor
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << EOF
            set -e

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull $IMAGE_NAME:latest

            docker stop $APP_NAME || true
            docker rm $APP_NAME || true

            mkdir -p ~/guias-despacho-data

            docker run -d \
              --name $APP_NAME \
              --restart unless-stopped \
              -p 8080:8080 \
              -e AWS_REGION=us-east-1 \
              -e S3_BUCKET="${{ secrets.S3_BUCKET }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e AZURE_AD_B2C_ISSUER_URI="${{ secrets.AZURE_AD_B2C_ISSUER_URI }}" \
              -e AZURE_AD_B2C_JWK_SET_URI="${{ secrets.AZURE_AD_B2C_JWK_SET_URI }}" \
              -v ~/guias-despacho-data:/app/data \
              $IMAGE_NAME:latest

            docker image prune -f
          EOF
