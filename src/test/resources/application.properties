spring.datasource.url=jdbc:h2:mem:guiasdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=
spring.h2.console.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9000/mock-issuer
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9000/.well-known/jwks.json

app.aws.region=us-east-1
app.aws.s3.bucket=guias-despacho-test
